<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Contractor Admin Panel</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

header {
    background: #13294B;
    padding: 20px;
    text-align: center;
    border-bottom: 4px solid orange;
}

.container {
    max-width: 1000px;
    margin: 30px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
}

/* GRID FIX */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    box-sizing: border-box;
}

.section {
    margin-top: 25px;
    padding: 15px;
    background: #f3f4f6;
    border-radius: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    background: orange;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

.small-btn {
    background: #13294B;
    color: white;
    margin-left: 5px;
}

.card {
    background: #e5e7eb;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>

</head>

<body>

<header>
<h1>Contractor Admin Panel</h1>
</header>

<div class="container">

<h2>Add Contractor</h2>

<div class="grid">
    <div>
        <label>Company Name</label>
        <input id="company">

        <label>State</label>
        <input id="state">
    </div>
</div>

<!-- CONTRACTOR CONTACTS -->
<div class="section">
    <h3>Contractor Contacts</h3>
    <div id="contractorContacts"></div>
    <button class="small-btn" onclick="addContractorContact()">+ Add Contact</button>
</div>

<!-- EZEE CONTACTS -->
<div class="section">
    <h3>Ezee Fiber Contacts</h3>
    <div id="ezeeContacts"></div>
    <button class="small-btn" onclick="addEzeeContact()">+ Add Contact</button>
</div>

<button onclick="saveContractor()">Save Contractor</button>

<div class="section">
<h3>Saved Contractors</h3>
<div id="list"></div>
</div>

</div>

<script>

function getContractors() {
    return JSON.parse(localStorage.getItem("contractors") || "[]");
}

/* ---------------- CONTACT ROW BUILDERS ---------------- */

function addContractorContact(name="", phone="", email="") {
    const div = document.createElement("div");
    div.innerHTML = `
        <input placeholder="Contact Name" value="${name}">
        <input placeholder="Phone" value="${phone}">
        <input placeholder="Email" value="${email}">
        <button onclick="this.parentElement.remove()">Delete</button>
        <hr>
    `;
    document.getElementById("contractorContacts").appendChild(div);
}

function addEzeeContact(name="", email="") {
    const div = document.createElement("div");
    div.innerHTML = `
        <input placeholder="Ezee Contact Name" value="${name}">
        <input placeholder="Ezee Email" value="${email}">
        <button onclick="this.parentElement.remove()">Delete</button>
        <hr>
    `;
    document.getElementById("ezeeContacts").appendChild(div);
}

/* ---------------- SAVE ---------------- */

function saveContractor() {

    const contractor = {
        company: document.getElementById("company").value,
        state: document.getElementById("state").value,

        contractorContacts: [],
        ezeeContacts: []
    };

    // contractor contacts
    document.querySelectorAll("#contractorContacts div").forEach(div => {
        const inputs = div.querySelectorAll("input");
        contractor.contractorContacts.push({
            name: inputs[0].value,
            phone: inputs[1].value,
            email: inputs[2].value
        });
    });

    // ezee contacts
    document.querySelectorAll("#ezeeContacts div").forEach(div => {
        const inputs = div.querySelectorAll("input");
        contractor.ezeeContacts.push({
            name: inputs[0].value,
            email: inputs[1].value
        });
    });

    let contractors = getContractors();
    contractors.push(contractor);

    localStorage.setItem("contractors", JSON.stringify(contractors));

    renderList();
    clearForm();
}

/* ---------------- DISPLAY ---------------- */

function renderList() {
    let contractors = getContractors();
    let html = "";

    contractors.forEach(c => {
        html += `
        <div class="card">
            <b>${c.company}</b> (${c.state})<br><br>

            <b>Contractor Contacts:</b><br>
            ${c.contractorContacts.map(x =>
                `${x.name} | ${x.phone} | ${x.email}`
            ).join("<br>")}

            <br><br>

            <b>Ezee Contacts:</b><br>
            ${c.ezeeContacts.map(x =>
                `${x.name} | ${x.email}`
            ).join("<br>")}
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* ---------------- CLEAR ---------------- */

function clearForm() {
    document.getElementById("company").value = "";
    document.getElementById("state").value = "";
    document.getElementById("contractorContacts").innerHTML = "";
    document.getElementById("ezeeContacts").innerHTML = "";
}

/* INIT */
addContractorContact();
addEzeeContact();
renderList();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZEE Contractor Email Tool</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
        }

        header{
            background:#13294B;
            padding:20px;
            text-align:center;
            border-bottom:4px solid orange;
        }

        h1{
            margin:0;
        }

        .container{
            width:900px;
            max-width:95%;
            margin:40px auto;
        }

        .card{
            background:white;
            color:black;
            border-radius:12px;
            padding:25px;
            box-shadow:0 8px 20px rgba(0,0,0,.25);
        }

        label{
            display:block;
            margin-top:20px;
            font-weight:bold;
        }

        select{
            width:100%;
            padding:12px;
            margin-top:8px;
            font-size:16px;
        }

        button{
            margin-top:25px;
            padding:14px 28px;
            background:orange;
            color:#13294B;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#ffb347;
        }
    </style>

</head>

<body>

<header>
    <h1>EZEE Contractor Email Tool</h1>
    <p>Version 1.0</p>
</header>

<div class="container">

    <div class="card">

        <h2>Select Contractor</h2>

        <label>Contractor</label>

        <select>

            <option>Select Contractor...</option>

            <option>Utilities One</option>

            <option>Ansco</option>

            <option>BComm</option>

        </select>

        <button>
            Continue
        </button>

    </div>

</div>

</body>

</html>

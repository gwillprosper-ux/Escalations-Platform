<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZEE Support Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* NAV BAR */
.navbar {
    background: #13294B;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid orange;
}

.nav-left button {
    margin-right: 10px;
    padding: 8px 12px;
    border: none;
    background: orange;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

/* USER */
.user {
    display: flex;
    align-items: center;
    gap: 10px;
}

.circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: orange;
    color: #13294B;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* PAGE AREA */
.page {
    padding: 40px;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">

    <div class="nav-left">
        <button onclick="loadPage('dashboard')">Dashboard</button>
        <button onclick="loadPage('email')">Email</button>
        <button onclick="loadPage('vendors')">Vendors</button>
    </div>

    <div class="user">
        <div id="userName">Loading...</div>
        <div id="userCircle">U</div>
    </div>

</div>

<!-- PAGE CONTENT -->
<div class="page" id="app">
Loading application...
</div>

<script>

// ---------------- LOGIN CHECK ----------------
const user = JSON.parse(localStorage.getItem("currentUser"));

if (!user) {
    window.location.href = "index.html";
}

// ---------------- USER DISPLAY ----------------
document.getElementById("userName").innerText =
    user.first + " " + user.last;

document.getElementById("userCircle").innerText =
    user.first[0] + user.last[0];

// ---------------- SPA ROUTER ----------------
function loadPage(page) {

    const app = document.getElementById("app");

    if (page === "dashboard") {
        app.innerHTML = `
            <h1>Dashboard</h1>
            <p>Welcome ${user.first}, you're logged into the system.</p>
        `;
    }

    if (page === "email") {
        app.innerHTML = `
            <h1>Email Generator</h1>
            <p>This will generate contractor follow-up emails.</p>
        `;
    }

    if (page === "vendors") {
        app.innerHTML = `
            <h1>Vendor Management</h1>
            <p>Add and manage contractors here.</p>
        `;
    }
}

// ---------------- START APP ----------------
loadPage("dashboard");

</script>

</body>
</html>

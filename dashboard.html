<script>

// GET USER
const user = JSON.parse(localStorage.getItem("currentUser"));

// REDIRECT IF NOT LOGGED IN
if (!user) {
    window.location.href = "index.html";
}

// DISPLAY USER NAME
document.getElementById("userName").innerText =
    user.first + " " + user.last;

document.getElementById("userCircle").innerText =
    user.first[0].toUpperCase() + user.last[0].toUpperCase();

document.getElementById("welcomeText").innerText =
    "Logged in as " + user.first + " " + user.last;

//
// 🚨 SPA FIX — NO MORE PAGE NAVIGATION
//

function goEmail() {
    // OLD: alert or page redirect ❌
    // NEW: SPA navigation ✅
    if (window.loadPage) {
        loadPage("email");
    } else {
        window.location.href = "app.html";
    }
}

function goVendor() {
    if (window.loadPage) {
        loadPage("vendors");
    } else {
        window.location.href = "app.html";
    }
}

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
}

</script>

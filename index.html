<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZEE Support Hub - Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN BOX */
.login-box {
    background: white;
    color: black;
    width: 380px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #555;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: orange;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ffb347;
}

.link {
    margin-top: 10px;
    font-size: 13px;
    color: #13294B;
    cursor: pointer;
    display: block;
}

.hidden {
    display: none;
}

.error {
    color: red;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="login-box">

<h1>EZEE Fiber Support Hub</h1>
<p id="subtitle">Login to continue</p>

<!-- LOGIN FORM -->
<div id="loginForm">

    <input id="loginUser" placeholder="Username or Email">
    <input id="loginPass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <span class="link" onclick="showCreate()">Create New Account</span>
</div>

<!-- CREATE ACCOUNT -->
<div id="createForm" class="hidden">

    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">
    <input id="email" placeholder="Email Address">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password (8+ chars)">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">

    <button onclick="createAccount()">Create Account</button>

    <span class="link" onclick="showLogin()">Back to Login</span>

    <div id="error" class="error"></div>
</div>

</div>

<script>

// ---------------- VIEW SWITCH ----------------
function showCreate() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("createForm").classList.remove("hidden");
    document.getElementById("subtitle").innerText = "Create your account";
}

function showLogin() {
    document.getElementById("createForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("subtitle").innerText = "Login to continue";
}

// ---------------- STORAGE ----------------
function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

// ---------------- PASSWORD VALIDATION ----------------
function validatePassword(pw) {
    return pw.length >= 8 &&
           /[A-Z]/.test(pw) &&
           /[a-z]/.test(pw) &&
           /[0-9]/.test(pw);
}

// ---------------- CREATE ACCOUNT ----------------
function createAccount() {
    const first = document.getElementById("firstName").value;
    const last = document.getElementById("lastName").value;
    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const pw = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    let error = "";

    if (!first || !last || !email || !username || !pw || !confirm) {
        error = "All fields are required.";
    } else if (!validatePassword(pw)) {
        error = "Password must be 8+ chars, upper, lower, number.";
    } else if (pw !== confirm) {
        error = "Passwords do not match.";
    }

    if (error) {
        document.getElementById("error").innerText = error;
        return;
    }

    let users = getUsers();

    if (users.find(u => u.username === username || u.email === email)) {
        document.getElementById("error").innerText = "User already exists.";
        return;
    }

    users.push({
        first,
        last,
        email,
        username,
        password: pw,
        role: "Representative"
    });

    saveUsers(users);

    alert("Account created! Please log in.");
    showLogin();
}

// ---------------- LOGIN ----------------
function login() {
    const input = document.getElementById("loginUser").value;
    const pw = document.getElementById("loginPass").value;

    let users = getUsers();

    let user = users.find(u =>
        (u.username === input || u.email === input) && u.password === pw
    );

    if (!user) {
        alert("Invalid login.");
        return;
    }

    // save session
    localStorage.setItem("currentUser", JSON.stringify(user));

    // ✅ FIXED ROUTE — DASHBOARD
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>

<script>

// ---------------- VIEW SWITCH ----------------
function showCreate() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("createForm").classList.remove("hidden");
    document.getElementById("subtitle").innerText = "Create your account";
}

function showLogin() {
    document.getElementById("createForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("subtitle").innerText = "Login to continue";
}

// ---------------- STORAGE ----------------
function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

// ---------------- PASSWORD VALIDATION ----------------
function validatePassword(pw) {
    return pw.length >= 8 &&
           /[A-Z]/.test(pw) &&
           /[a-z]/.test(pw) &&
           /[0-9]/.test(pw);
}

// ---------------- CREATE ACCOUNT ----------------
function createAccount() {
    const first = document.getElementById("firstName").value;
    const last = document.getElementById("lastName").value;
    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const pw = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    let error = "";

    if (!first || !last || !email || !username || !pw || !confirm) {
        error = "All fields are required.";
    } else if (!validatePassword(pw)) {
        error = "Password must be 8+ chars, upper, lower, number.";
    } else if (pw !== confirm) {
        error = "Passwords do not match.";
    }

    if (error) {
        document.getElementById("error").innerText = error;
        return;
    }

    let users = getUsers();

    if (users.find(u => u.username === username || u.email === email)) {
        document.getElementById("error").innerText = "User already exists.";
        return;
    }

    users.push({
        first,
        last,
        email,
        username,
        password: pw,
        role: "Representative"
    });

    saveUsers(users);

    alert("Account created! Please log in.");
    showLogin();
}

// ---------------- LOGIN ----------------
function login() {
    const input = document.getElementById("loginUser").value;
    const pw = document.getElementById("loginPass").value;

    let users = getUsers();

    let user = users.find(u =>
        (u.username === input || u.email === input) && u.password === pw
    );

    if (!user) {
        alert("Invalid login.");
        return;
    }

    // save session
    localStorage.setItem("currentUser", JSON.stringify(user));

    // ✅ SPA ROUTE (IMPORTANT CHANGE)
    window.location.href = "app.html";
}

</script>

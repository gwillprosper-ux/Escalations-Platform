<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZEE Contractor Tool Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #13294B;
    padding: 25px;
    text-align: center;
    border-bottom: 4px solid orange;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    background: orange;
    color: #13294B;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
}

button:hover {
    background: #ffb347;
}
</style>

</head>

<body>

    <div style="
    background:#13294B;
    padding:12px;
    display:flex;
    gap:10px;
    justify-content:center;
    border-bottom:4px solid orange;
">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='admin.html'">Admin</button>
    <button onclick="location.href='email.html'">Email Tool</button>
</div>

<header>
    <h1>EZEE Fiber Contractor Hub</h1>
    <p>Central Operations Console</p>
</header>

<div class="container">

    <div class="card">
        <h2>Contractor Administration</h2>
        <p>Add, edit, and manage contractor contact information.</p>
        <button onclick="goAdmin()">Open Admin Panel</button>
    </div>

    <div class="card">
        <h2>Email Generator Tool</h2>
        <p>Create Outlook-ready follow-up emails for contractors.</p>
        <button onclick="goTool()">Open Email Tool</button>
    </div>

</div>

<script>
function goAdmin() {
    window.location.href = "admin.html";
}

function goTool() {
    alert("Email tool will be connected next step 🔧");
}
</script>

</body>
</html>
